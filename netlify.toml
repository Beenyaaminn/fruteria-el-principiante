# Netlify configuration para Frutería El Principiante
# https://docs.netlify.com/frameworks/next-js/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "false"

# Plugin oficial de Netlify para Next.js (App Router, SSR, ISR, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache de assets estáticos por 1 año
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Funciones: Prisma necesita conexiones más largas
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client", "prisma"]
